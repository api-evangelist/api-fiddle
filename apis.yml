common:
  - type: Website
    url: https://api-fiddle.com/
  - type: Blog
    url: https://blog.api-fiddle.com/
  - type: GitHubRepository
    url: https://github.com/apps/api-fiddle
  - type: Features
    data:
      - name: OpenAPI-First Design
        description: >-
          Design professional REST APIs directly in the OpenAPI specification format with first-class support for
          OpenAPI 3.x standards.
      - name: Collaborative Playground
        description: >-
          Share API definitions with teams without requiring user accounts, enabling frictionless collaboration across
          the API design process.
      - name: Data Transfer Object Support
        description: >-
          First-class support for data transfer objects, enabling well-structured API schemas and reusable component
          definitions.
      - name: API Versioning
        description: Built-in guidance and support for API versioning strategies to help teams manage API evolution over time.
      - name: Best Practice Guidance
        description: >-
          Provides extensive guidance on parameter serialization, pagination patterns, response structuring, and
          suggested response codes.
      - name: Automation-Optimized
        description: >-
          Specifications are optimized for automation and code generation, enabling integration into CI/CD pipelines and
          developer toolchains.
  - type: UseCases
    data:
      - name: API Design and Prototyping
        description: Design and prototype REST APIs using OpenAPI before implementation, enabling API-first development workflows.
      - name: Team Collaboration on API Specs
        description: >-
          Collaborate with distributed teams on OpenAPI specifications without requiring accounts, reducing friction in
          the review process.
      - name: API Documentation
        description: Generate and publish professional API documentation from OpenAPI specifications with integrated tooling.
  - type: Integrations
    data:
      - name: GitHub
        description: >-
          GitHub App integration for connecting API Fiddle projects to GitHub repositories for version control and CI/CD
          workflows.
      - name: OpenAPI Ecosystem
        description: >-
          Exports standard OpenAPI 3.x specifications compatible with the full OpenAPI tooling ecosystem including
          generators, validators, and documentation tools.
  - type: LLMsTxt
    url: https://api-fiddle.com/llms.txt
