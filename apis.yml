apis:
  - aid: api-fiddle:api-fiddle
    name: API-Fiddle
    description: >-
      The API Fiddle API provides programmatic access to the API Fiddle design platform, enabling management of
      projects, specifications, workspaces, sharing, and export capabilities. It allows developers to automate API
      design workflows, collaborate on OpenAPI specifications, and integrate API Fiddle into their development
      pipelines.
    humanURL: https://api-fiddle.com/
    tags:
      - API Design
      - OpenAPI
      - Collaboration
    properties:
